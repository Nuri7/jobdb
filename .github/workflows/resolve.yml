name: resolve-career-pages

on:
  schedule:
    - cron: '0 2 * * 0' # Sundays 02:00 UTC — re-verify broken/unverified pages
  workflow_dispatch:
    inputs:
      all:
        description: 'Resolve ALL companies (not just broken/unverified)'
        type: boolean
        default: false
      limit:
        description: 'Max companies this run'
        required: false

concurrency:
  group: jobdb-pipeline # shared with refresh.yml — runs never overlap
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - run: npm ci

      - name: Resolve
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'claude-haiku-4-5-20251001' }}
          COMPANY_CONCURRENCY: ${{ vars.COMPANY_CONCURRENCY || '16' }}
        # Weekly health sweep: re-check broken/moved pages AND verified-but-empty ones
        # (0 jobs = likely wrong/moved page). Manual dispatch with all:true re-resolves everything.
        run: >
          npx tsx src/cli.ts resolve
          ${{ inputs.all == true && '--all' || '--stale' }}
          ${{ inputs.limit && format('--limit {0}', inputs.limit) || '' }}

      - name: Stats summary
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npx tsx src/cli.ts stats --format md >> "$GITHUB_STEP_SUMMARY"

      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          NUM=$(gh issue list --search "in:title 🔴 Pipeline failing" --state open --json number -q '.[0].number' 2>/dev/null || true)
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --body "\`${{ github.workflow }}\` failed — $RUN_URL"
          else
            gh issue create --title "🔴 Pipeline failing" --body "\`${{ github.workflow }}\` failed — $RUN_URL" || true
          fi
